<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css\style.css">
    <title>CineView Dashboard</title>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="top-nav">
            <div class="logo">CineView</div>
            <div class="user-controls">
                <span>Search</span>
                <span>Profile</span>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="#">Home</a>
                <a href="#">Trending</a>
                <a href="#">Library</a>
            </nav>
        </aside>

        <main class="content-area">
            <h2>Recommended for You</h2>
            <div class="movie-grid">
                <div class="movie-card">Movie 1</div>
                <div class="movie-card">Movie 2</div>
                <div class="movie-card">Movie 3</div>
                <div class="movie-card">Movie 4</div>
                <div class="movie-card">Movie 5</div>
                <div class="movie-card">Movie 6</div>
            </div>
             <section class="empty-state">
            <div class="message">
                Watchlist.
            </div>
        </section>
        </main>
    </div>

</body>
</html>
